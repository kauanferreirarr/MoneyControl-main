<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyControl</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { '2xl': '16px', '3xl': '20px' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/index-components.css">
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-slate-100 min-h-screen">

    <!-- Top Bar -->
    <header id="topo" class="top-bar fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/50 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <img src="assets/logo.png" alt="MoneyControl" class="h-12 w-auto object-contain drop-shadow-sm">
            <button id="menuButton" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-colors duration-200" aria-label="Menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600">
                    <circle cx="12" cy="5" r="1"></circle>
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="12" cy="19" r="1"></circle>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-4 sm:px-6 pt-24 pb-8">

        <!-- Balance Cards -->
        <section id="saldo" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <!-- Saldo Atual -->
            <div class="card-hover card-saldo relative rounded-2xl p-6 overflow-hidden shadow-lg shadow-emerald-200">
                <div class="relative z-10">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs font-semibold text-emerald-100 uppercase tracking-wider">Saldo Atual</span>
                        <div class="w-10 h-10 rounded-xl bg-white/25 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                    </div>
                    <h2 id="saldo-atual" class="text-3xl sm:text-4xl font-extrabold text-white balance-animate">R$ 0,00</h2>
                </div>
                <svg class="absolute bottom-0 left-0 w-full h-20 opacity-20" viewBox="0 0 200 60" preserveAspectRatio="none">
                    <path class="sparkline-path" d="M0,45 Q25,40 50,35 T100,25 T150,15 T200,10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M0,45 Q25,40 50,35 T100,25 T150,15 T200,10 L200,60 L0,60 Z" fill="white" opacity="0.08"/>
                </svg>
            </div>

            <!-- Gastos do Mes -->
            <div class="card-hover card-gastos relative rounded-2xl p-6 overflow-hidden shadow-lg shadow-rose-200">
                <div class="relative z-10">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs font-semibold text-rose-100 uppercase tracking-wider">Gastos do Mes</span>
                        <div class="w-10 h-10 rounded-xl bg-white/25 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                <line x1="1" y1="10" x2="23" y2="10"></line>
                            </svg>
                        </div>
                    </div>
                    <h2 id="gastos-atual" class="text-3xl sm:text-4xl font-extrabold text-white balance-animate">R$ 0,00</h2>
                </div>
                <svg class="absolute bottom-0 left-0 w-full h-20 opacity-20" viewBox="0 0 200 60" preserveAspectRatio="none">
                    <path class="sparkline-path" d="M0,50 Q25,45 50,38 T100,30 T150,22 T200,18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M0,50 Q25,45 50,38 T100,30 T150,22 T200,18 L200,60 L0,60 Z" fill="white" opacity="0.08"/>
                </svg>
            </div>
        </section>

        <!-- Add Expense Card -->
        <section id="dispesas" class="bg-white rounded-2xl p-6 shadow-md shadow-slate-200/50 border border-slate-100 mb-6">
            <h2 class="text-lg font-bold text-slate-800 mb-5">Adicionar nova Despesa ou Saldo</h2>

            <form action="" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-500 mb-1.5" for="valor">Valor</label>
                        <input type="number" name="valor" id="valor" placeholder="R$ 0,00"
                            class="input-focus w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl text-base text-slate-700 placeholder-slate-300 font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-500 mb-1.5" for="descricao">Descricao</label>
                        <input type="text" name="descricao" id="descricao" placeholder="No que voce gastou?"
                            class="input-focus w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl text-base text-slate-700 placeholder-slate-300 font-medium">
                    </div>
                </div>
            </form>

            <!-- Quick Tags -->
            <div class="butoes-sugestivos flex flex-wrap gap-2.5 mt-5">
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Contas</button>
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Gasolina</button>
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Mercado</button>
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Lanche</button>
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Lazer</button>
                <button type="button" class="chip px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-semibold rounded-full border border-indigo-200 transition-all duration-200">Janta</button>
            </div>

            <!-- Action Buttons -->
            <div class="butoes-acao flex flex-col sm:flex-row gap-3 mt-6">
                <button id="ad-dispesas" class="flex-1 px-6 py-4 bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white text-base font-bold rounded-xl transition-all duration-200 shadow-lg shadow-indigo-200">
                    Adicionar Despesa
                </button>
                <button id="ad-saldo" class="flex-1 px-6 py-4 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white text-base font-bold rounded-xl transition-all duration-200 shadow-lg shadow-emerald-200">
                    Adicionar Saldo
                </button>
            </div>
        </section>

        <!-- Transaction History -->
        <section id="historico" class="bg-white rounded-2xl shadow-md shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <div class="px-6 pt-6 pb-4 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-slate-800">Extrato</h2>
                        <p class="text-xs text-slate-400 font-medium">Historico de transacoes</p>
                    </div>
                </div>
            </div>
            <ul id="historico-list" class="custom-scroll">
            </ul>
        </section>

    </main>

    <!-- Sidebar Overlay -->
    <div id="overlay" class="overlay-bg fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] opacity-0 pointer-events-none"></div>

    <!-- Sidebar Panel -->
    <aside id="sidebar" class="sidebar-panel fixed top-0 right-0 h-full w-[320px] max-w-[85vw] bg-white z-[101] shadow-2xl translate-x-full flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
            <h2 class="text-xl font-bold text-slate-800">Menu</h2>
            <button id="closeButton" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-colors duration-200 text-slate-400 hover:text-slate-600" aria-label="Fechar menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- User Profile -->
        <div class="px-6 py-7 flex flex-col items-center border-b border-slate-100 bg-gradient-to-b from-indigo-50/50 to-white">
            <div id="user-avatar" class="user-avatar w-20 h-20 rounded-full bg-gradient-to-br from-indigo-400 to-indigo-600 text-white flex items-center justify-center text-2xl font-bold shadow-lg shadow-indigo-200 mb-3 ring-4 ring-white overflow-hidden">
              <img id="user-photo" class="hidden w-full h-full object-cover" alt="Foto de perfil">
              <span id="user-initials"></span>
            </div>
            <div id="user-name" class="user-name text-lg font-bold text-slate-800"></div>
            <div id="user-email" class="user-email text-sm text-slate-400 mt-1"></div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4 px-3 overflow-y-auto">
            <ul class="space-y-1">
                <li>
                    <a href="#saldo" class="menu-link active flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all duration-200 bg-indigo-50 text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="9"></rect>
                            <rect x="14" y="3" width="7" height="5"></rect>
                            <rect x="14" y="12" width="7" height="9"></rect>
                            <rect x="3" y="16" width="7" height="5"></rect>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-link flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200" data-action="mudar-nome">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        Mudar Nome
                    </a>
                </li>
                <li>
                    <a href="config.html" class="menu-link flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        Configuracoes
                    </a>
                </li>
                <li>
                    <a href="#" class="menu-link flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        Ajuda
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Logout -->
        <div class="px-3 py-4 border-t border-slate-100">
            <a href="./login.html" id="menu-sair" class="menu-link flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-semibold text-slate-400 hover:bg-rose-50 hover:text-rose-500 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair da Conta
            </a>
        </div>
    </aside>

    <!-- Change Name Modal -->
    <div id="modal-trocar-nome" class="modal-overlay fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <h2 class="text-lg font-bold text-slate-800">Alterar Nome</h2>
                <button class="close-modal w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-colors duration-200 text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="px-6 py-5">
                <form id="form-trocar-nome">
                    <label class="block text-sm font-semibold text-slate-500 mb-1.5" for="novo-nome">Novo Nome</label>
                    <input type="text" id="novo-nome" placeholder="Digite seu nome completo" required
                        class="input-focus w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-200 rounded-xl text-base text-slate-700 placeholder-slate-300 font-medium mb-5">
                    <button type="submit" class="w-full px-6 py-3.5 bg-indigo-500 hover:bg-indigo-600 text-white text-base font-bold rounded-xl transition-all duration-200 shadow-lg shadow-indigo-200">
                        Salvar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="js/script.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
