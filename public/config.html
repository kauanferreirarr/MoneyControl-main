<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/config.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
  <!-- SweetAlert2 para alertas bonitos -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <title>Configurações - MoneyControl</title>
</head>
<body class="bodyconfig">

  <section id="config">
    <!-- Cabeçalho -->
    <div class="config-header">
      <a href="index.html" class="btn-back">
        <img class="icon1" src="assets/seta-esquerda.png" alt="voltar">
      </a>
      <h2 class="medio-text">Configurações</h2>
    </div>

    <!-- Opção de reinício -->
    <div class="config-item">
      <img class="icon2" src="assets/calendario.png" alt="calendario">
      <div class="config-text">
        <h2 class="medio-text">Reinício do saldo mensal</h2>
        <p>Defina quando seu saldo e histórico do mês vão reiniciar automaticamente</p>
      </div>
      <img class="icon1" src="assets/seta-direita.png" alt="ir">
    </div>

    <!-- Opção de Importar CSV -->
    <div class="config-item">
      <img class="icon2" src="assets/nuvem.png" alt="nuvem">
      <div class="config-text">
        <h2 class="medio-text">Importar histórico de transações</h2>
        <p>Importe um arquivo CSV do seu banco (Nubank, Inter ou Itaú) para preencher seu histórico.</p>
        
        <!-- FORMULÁRIO ATUALIZADO (Sem action, pois usaremos JS) -->
        <form id="form-extrato-csv" enctype="multipart/form-data" style="margin-top: 15px;">
          
          <input 
            type="file" 
            name="arquivo_extrato" 
            accept=".csv" 
            required
            id="csv-file-input"  
            class="input-file-oculto" 
          >
          
          <label for="csv-file-input" class="label-customizado" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
            <img src="assets/papel.png" width="30px" height="30px" alt="papel">
            <span id="nome-arquivo">Clique para escolher o arquivo CSV</span>
          </label>
                            
          <button type="submit" class="btn-submit" id="btn-enviar-csv" style="margin-top: 10px; width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Enviar Extrato
          </button>
        </form>
      </div>
    </div>

    <!-- Opção de Perfil -->
    <div class="config-item">
      <img class="icon2" src="assets/perfil.png" alt="perfil">
      <div class="config-text">
        <h2 class="medio-text">Perfil</h2>
        <p>Altere sua foto de perfil e seu nome de usuário</p>
      </div>
      <img class="icon1" src="assets/seta-direita.png" alt="ir">
    </div>

  </section>

  <!-- SCRIPT DE INTEGRAÇÃO (A MÁGICA ACONTECE AQUI) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

    // Configuração Firebase (A mesma do seu main.js)
    const firebaseConfig = {
      apiKey: "AIzaSyAFqvulIgDvpk7ukasWMeEpq_BFUCt94Lo", // Substitua se necessário, mas geralmente é pública
      authDomain: "moneycontrol-e0c85.firebaseapp.com",
      projectId: "moneycontrol-e0c85",
      storageBucket: "moneycontrol-e0c85.firebasestorage.app",
      messagingSenderId: "1059412393084",
      appId: "1:1059412393084:web:0d35999554a9332205565e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let currentUser = null;

    // 1. Monitorar Autenticação para pegar o UID
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        console.log("Usuário detectado para upload:", user.uid);
      } else {
        // Se não tiver logado, manda pro login
        window.location.href = "login.html";
      }
    });

    // 2. Atualizar nome do arquivo quando selecionar
    document.getElementById('csv-file-input').addEventListener('change', function(e) {
        const fileName = e.target.files[0]?.name;
        if (fileName) {
            document.getElementById('nome-arquivo').textContent = fileName;
        }
    });

    // 3. Interceptar o Envio do Formulário
    document.getElementById('form-extrato-csv').addEventListener('submit', async (e) => {
      e.preventDefault(); // Impede a página de recarregar (TELA BRANCA NUNCA MAIS!)

      if (!currentUser) {
        Swal.fire('Erro', 'Você precisa estar logado para enviar arquivos.', 'error');
        return;
      }

      const fileInput = document.getElementById('csv-file-input');
      const file = fileInput.files[0];

      if (!file) {
        Swal.fire('Atenção', 'Selecione um arquivo CSV primeiro.', 'warning');
        return;
      }

      // Preparar dados para envio
      const formData = new FormData();
      formData.append('arquivo_extrato', file);
      formData.append('user_id', currentUser.uid); // AQUI ESTÁ O SEGREDO! Envia o UID correto.

      // Feedback visual de carregamento
      const btn = document.getElementById('btn-enviar-csv');
      const textoOriginal = btn.innerText;
      btn.innerText = "Processando... aguarde";
      btn.disabled = true;

      try {
        // Chama sua API Node.js
        const response = await fetch('/api/processar_extrato', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (response.ok && data.success) {
          Swal.fire({
            title: 'Sucesso!',
            text: data.mensagem,
            icon: 'success',
            confirmButtonText: 'Ver Extrato'
          }).then(() => {
             window.location.href = "index.html"; // Volta para a home para ver o saldo
          });
        } else {
          throw new Error(data.erro || 'Erro desconhecido no servidor.');
        }

      } catch (error) {
        console.error("Erro no upload:", error);
        Swal.fire('Erro', `Falha ao processar: ${error.message}`, 'error');
      } finally {
        // Restaura o botão
        btn.innerText = textoOriginal;
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
